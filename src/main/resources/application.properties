spring.application.name=smart-Finance-Tracker-App
spring.datasource.url=${XDB_URL:jdbc:mysql://localhost:3306/xpensetrackerdb}

spring.datasource.username=${XDB_USERNAME:root}
spring.datasource.password=${XDB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata